syntax = "proto3";

import "google/protobuf/timestamp.proto";

option java_package = "com.example.grpc";

service RechnungsmetadatenService {

  rpc SpeicherMetadaten(MetadatenSpeichernRequest) returns (APIResponse);
}

message Geld {
  double betrag = 1;
  string waehrungs_code = 2;
}

message Rechnungsposition {
  string artikelnummer = 1;
  double menge = 2;
  Geld einzelpreis = 3;
}

message MetadatenSpeichernRequest {
  string rechnungsnummer = 1;
  google.protobuf.Timestamp rechnungsdatum = 2;
  google.protobuf.Timestamp faelligkeitsdatum = 3;
  string rechnungsausteller = 4;
  string rechnungsempfaenger = 5;
  repeated Rechnungsposition positionen = 6;
  string iban = 7;
  string bic = 8;
}

message APIResponse {
  string responsemessage = 1;
  int32 responseCode = 2;
}